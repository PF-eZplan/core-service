services:
  db:
    image: postgres:15
    container_name: calbak-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USERNAME:-calbak_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-calbak_password}
      POSTGRES_DB: calbak_db
    volumes:
      - calbak-db-data:/var/lib/postgresql/data
    restart: always

volumes:
  calbak-db-data: