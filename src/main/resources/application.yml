spring:
  application:
    name: calbak
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/calbak_db}
    username: ${DB_USERNAME:calbak_user}
    password: ${DB_PASSWORD:calbak_password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate.format_sql: true
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:YOUR_GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET:YOUR_GOOGLE_CLIENT_SECRET}
            scope: profile, email

gemini:
  api:
    key: ${GEMINI_API_KEY:YOUR_GEMINI_API_KEY}
    url: https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-lite:generateContent

app:
  frontend:
    url: ${FRONTEND_URL:http://localhost:3000}