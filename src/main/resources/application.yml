spring:
    application:
        name: calbak
    datasource:
        url: ${DB_URL:jdbc:postgresql://localhost:5432/calbak_db}
        username: ${DB_USERNAME:calbak_user}
        password: ${DB_PASSWORD}
        driver-class-name: org.postgresql.Driver
    jpa:
        hibernate:
            ddl-auto: none
        show-sql: false
    security:
        oauth2:
            client:
                registration:
                    google:
                        client-id: ${GOOGLE_CLIENT_ID}
                        client-secret: ${GOOGLE_CLIENT_SECRET}
                        scope: profile, email

jwt:
    secret: ${JWT_SECRET}
    access-token-expiry: 3600000  # 1시간
    refresh-token-expiry: 1209600000 # 14일

gemini:
    api:
        key: ${GEMINI_API_KEY}
        url: https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-lite:generateContent

app:
    # 1. API 통신을 허용할 브라우저/앱 주소 (CORS)
    cors:
        allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,https://calbak.o-r.kr}
    # 2. 구글 로그인 완료 후 튕겨낼 딥링크 주소
    oauth:
        redirect-url: ${OAUTH_REDIRECT_URL:http://localhost:3000}
    cookie:
        secure: true

server:
    forward-headers-strategy: framework
