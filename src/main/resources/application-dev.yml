spring:
    datasource:
        password: calbak_password
    jpa:
        hibernate:
            ddl-auto: validate       # Flyway가 스키마 관리, Hibernate는 검증만
        show-sql: true            # 개발 환경에서만 SQL 로그 노출 허용
        properties:
            hibernate:
                format_sql: true      # 쿼리 보기 좋게 정렬

    flyway:
        # 로컬/개발 환경에서만 초기 스키마 히스토리를 강제로 맞추기 위해 사용
        baseline-on-migrate: true

app:
    cookie:
        secure: false
