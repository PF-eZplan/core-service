name: CD-PROD (Deploy to EC2)

on:
    push:
        branches: [ "main" ]

permissions:
    contents: read

jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            -   name: Checkout code
                uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
                with:
                    persist-credentials: false

            -   name: Set up JDK 17
                uses: actions/setup-java@99b8673ff64fbf99d8d325f52d9a5bdedb8483e9
                with:
                    java-version: '17'
                    distribution: 'temurin'

            -   name: Setup Gradle
                uses: gradle/actions/setup-gradle@d9c87d481d55275bb5441eef3fe0e46805f9ef70

            -   name: Grant execute permission for gradlew
                run: chmod +x gradlew

            -   name: Build with Gradle
                run: ./gradlew clean build -x test

            -   name: Log in to Docker Hub
                uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
                with:
                    username: ${{ secrets.DOCKERHUB_USERNAME }}
                    password: ${{ secrets.DOCKERHUB_TOKEN }}

            -   name: Build and push Docker image
                uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25
                with:
                    context: .
                    push: true
                    tags: |
                        ${{ secrets.DOCKERHUB_USERNAME }}/calbak-api:latest
                        ${{ secrets.DOCKERHUB_USERNAME }}/calbak-api:${{ github.sha }}

            -   name: Validate Environment Variables
                env:
                    CORS_ALLOWED_ORIGINS: ${{ vars.CORS_ALLOWED_ORIGINS }}
                run: |
                    if [ -z "$(echo "$CORS_ALLOWED_ORIGINS" | xargs)" ]; then
                        echo "Error: CORS_ALLOWED_ORIGINS variable is missing or blank!"
                        exit 1
                    fi

            -   name: Deploy to AWS EC2
                uses: appleboy/ssh-action@029f5b4aeeeb58fdfe1410a5d17f967dacf36262
                env:
                    DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
                    DB_URL: ${{ secrets.DB_URL }}
                    DB_USERNAME: ${{ secrets.DB_USERNAME }}
                    DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
                    GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
                    GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
                    JWT_SECRET: ${{ secrets.JWT_SECRET }}
                    GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
                    FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
                    CORS_ALLOWED_ORIGINS: ${{ vars.CORS_ALLOWED_ORIGINS }}
                    IMAGE_TAG: ${{ github.sha }}
                with:
                    host: ${{ secrets.EC2_HOST }}
                    username: ${{ secrets.EC2_USERNAME }}
                    key: ${{ secrets.EC2_SSH_KEY }}
                    envs: DOCKERHUB_USERNAME,DB_URL,DB_USERNAME,DB_PASSWORD,GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET,JWT_SECRET,GEMINI_API_KEY,FRONTEND_URL,CORS_ALLOWED_ORIGINS,IMAGE_TAG
                    script: |
                        set -Eeuo pipefail
                        cd ~/calbak || exit 1
                        trap 'rm -f ~/calbak/.env' EXIT INT TERM
                        umask 077
                        : > .env
                        printf "DOCKERHUB_USERNAME=%s\n" "$DOCKERHUB_USERNAME" >> .env
                        printf "DB_URL=%s\n" "$DB_URL" >> .env
                        printf "DB_USERNAME=%s\n" "$DB_USERNAME" >> .env
                        printf "DB_PASSWORD=%s\n" "$DB_PASSWORD" >> .env
                        printf "GOOGLE_CLIENT_ID=%s\n" "$GOOGLE_CLIENT_ID" >> .env
                        printf "GOOGLE_CLIENT_SECRET=%s\n" "$GOOGLE_CLIENT_SECRET" >> .env
                        printf "JWT_SECRET=%s\n" "$JWT_SECRET" >> .env
                        printf "GEMINI_API_KEY=%s\n" "$GEMINI_API_KEY" >> .env
                        printf "FRONTEND_URL=%s\n" "$FRONTEND_URL" >> .env
                        printf "CORS_ALLOWED_ORIGINS=%s\n" "$CORS_ALLOWED_ORIGINS" >> .env
                        printf "IMAGE_TAG=%s\n" "$IMAGE_TAG" >> .env

                        sudo docker-compose pull
                        sudo docker-compose down
                        sudo docker-compose up -d

                        # Actuator 기반의 헬스 체크 폴링 적용
                        echo "Starting production-grade health check loop..."
                        HEALTH_SUCCESS=false
                        for i in $(seq 1 12); do
                            sleep 5
                            # curl 명령어에 timeout을 명시하여 무한 대기 현상 방지
                            if sudo docker-compose ps api | grep -q "Up" && \
                               curl --connect-timeout 2 --max-time 4 -sf http://localhost:8080/actuator/health > /dev/null; then
                                echo "Health Check Passed successfully."
                                HEALTH_SUCCESS=true
                                echo "$IMAGE_TAG" > .last_successful_tag
                                break
                            fi
                            echo "Container is still initializing... retry ($i/12)"
                        done

                        # 헬스 체크 실패 시 롤백 적용
                        if [ "$HEALTH_SUCCESS" = false ]; then
                            echo "Health Check Failed: Container did not enter healthy state within 60 seconds."
                            sudo docker-compose logs --tail=50
                            echo "Rolling back to last known successful image tag..."
                        
                            PREV_TAG=$(cat .last_successful_tag 2>/dev/null || echo "")
                        
                            if [ -n "$PREV_TAG" ] && [ "$PREV_TAG" != "$IMAGE_TAG" ]; then
                                echo "Rollback Target Tag found: $PREV_TAG"
                                sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=$PREV_TAG/" .env
                                sudo docker-compose up -d
                                echo "Rollback triggered. The pipeline will now exit with failure."
                            else
                                echo "No valid previous successful tag found for rollback. Shutting down."
                                sudo docker-compose down
                            fi
                            exit 1
                        fi

                        # 탭(\t) 구분자를 통한 날짜/시간 기준 N-1 이미지 유지 스크립트
                        sudo docker images --format '{{.ID}}\t{{.CreatedAt}}' "$DOCKERHUB_USERNAME/calbak-api" \
                            | sort -t$'\t' -k2 -r \
                            | awk -F'\t' '{print $1}' \
                            | uniq | tail -n +3 \
                            | xargs -r sudo docker rmi -f || true
                        
                        sudo docker image prune -f || true
