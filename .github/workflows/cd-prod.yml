name: CD-PROD (Deploy to EC2)

on:
    push:
        branches: [ "main" ]

permissions:
    contents: read

jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            -   name: Checkout code
                uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
                with:
                    persist-credentials: false

            -   name: Set up JDK 17
                uses: actions/setup-java@99b8673ff64fbf99d8d325f52d9a5bdedb8483e9
                with:
                    java-version: '17'
                    distribution: 'temurin'
                    cache: 'gradle'

            -   name: Grant execute permission for gradlew
                run: chmod +x gradlew

            -   name: Build with Gradle
                run: ./gradlew clean build -x test

            -   name: Log in to Docker Hub
                uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567
                with:
                    username: ${{ secrets.DOCKERHUB_USERNAME }}
                    password: ${{ secrets.DOCKERHUB_TOKEN }}

            -   name: Build and push Docker image
                uses: docker/build-push-action@4a13b500e55f0bdb5c1c94441dd13e2f5ff57a07
                with:
                    context: .
                    push: true
                    tags: ${{ secrets.DOCKERHUB_USERNAME }}/calbak-api:latest

            -   name: Deploy to AWS EC2
                uses: appleboy/ssh-action@7eaf76671a0d7eec729f637389d8117228bf52bf
                env:
                    DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
                    DB_URL: ${{ secrets.DB_URL }}
                    DB_USERNAME: ${{ secrets.DB_USERNAME }}
                    DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
                    GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
                    GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
                    JWT_SECRET: ${{ secrets.JWT_SECRET }}
                    GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
                    FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
                with:
                    host: ${{ secrets.EC2_HOST }}
                    username: ${{ secrets.EC2_USERNAME }}
                    key: ${{ secrets.EC2_SSH_KEY }}
                    envs: DOCKERHUB_USERNAME,DB_URL,DB_USERNAME,DB_PASSWORD,GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET,JWT_SECRET,GEMINI_API_KEY,FRONTEND_URL
                    script: |
                        cd ~/calbak
                        cat > .env << 'EOF'
                        DOCKERHUB_USERNAME=$DOCKERHUB_USERNAME
                        DB_URL=$DB_URL
                        DB_USERNAME=$DB_USERNAME
                        DB_PASSWORD=$DB_PASSWORD
                        GOOGLE_CLIENT_ID=$GOOGLE_CLIENT_ID
                        GOOGLE_CLIENT_SECRET=$GOOGLE_CLIENT_SECRET
                        JWT_SECRET=$JWT_SECRET
                        GEMINI_API_KEY=$GEMINI_API_KEY
                        FRONTEND_URL=$FRONTEND_URL
                        EOF
                        
                        chmod 600 .env
                        sudo docker-compose pull
                        sudo docker-compose down
                        sudo docker-compose up -d
                        sudo docker image prune -f
                        rm .env
