name: Java CI/CD with Gradle

on:
  push:
    branches: [ "main", "dev" ] # 코드가 합쳐질 때 배포 실행
  pull_request:
    branches: [ "main", "dev", "master", "develop" ] # PR 시 빌드 검증

permissions:
  contents: read # 코드를 읽을 수 있는 기본 권한 (필요 시 write로 변경 가능)

jobs:
  # [1단계] 빌드 및 테스트 (CI)
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    # 프로젝트 초기 단계라면 아래 빌드 스텝을 주석 해제하여 사용하세요.
    # - name: Grant execute permission for gradlew
    #   run: chmod +x gradlew

    # - name: Build with Gradle
    #   run: ./gradlew build

    - name: Early Stage Message
      run: echo "✅ 프로젝트 초기 설정 단계입니다. 빌드 코드는 준비되면 주석을 해제하세요."

  # [2단계] 배포 (CD)
  deploy:
    needs: build # 빌드 단계가 성공해야만 실행됨
    if: github.event_name == 'push' # PR이 아닌 실제 병합(Push) 시에만 실행
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy Placeholder
        run: |
          echo "🎉 빌드 검증이 완료되었습니다!"
          echo "🚀 나중에 배포 환경(AWS, Cloudtype 등)이 결정되면 여기에 스크립트를 추가하세요."
