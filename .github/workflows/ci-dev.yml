name: CI-DEV (Build & Test for Dev)

on:
    push:
        branches: [ "dev" ]
    pull_request:
        branches: [ "dev" ]

permissions:
    contents: read

jobs:
    build:
        runs-on: ubuntu-latest

        # 테스트를 위해 가상 서버에 PostgreSQL 임시 실행
        services:
            postgres:
                image: postgres:15
                env:
                    POSTGRES_USER: calbak_user
                    POSTGRES_PASSWORD: calbak_password
                    POSTGRES_DB: calbak_db
                ports:
                    - 5432:5432
                # DB가 완전히 켜질 때까지 기다리는 헬스체크 옵션
                options: >-
                    --health-cmd pg_isready
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5

        steps:
            -   name: Checkout code
                uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
                with:
                    persist-credentials: false

            -   name: Set up JDK 17
                uses: actions/setup-java@99b8673ff64fbf99d8d325f52d9a5bdedb8483e9
                with:
                    java-version: '17'
                    distribution: 'temurin'

            -   name: Setup Gradle
                uses: gradle/actions/setup-gradle@v3

            -   name: Grant execute permission for gradlew
                run: chmod +x gradlew

            -   name: Build and Test with Gradle
                env:
                    GOOGLE_CLIENT_ID: dummy
                    GOOGLE_CLIENT_SECRET: dummy
                    JWT_SECRET: ZHVtbXlfc2VjcmV0X2tleV9mb3JfdGVzdF9lbnZpcm9ubWVudF9tdXN0X2JlX2xvbmdfZW5vdWdo
                    GEMINI_API_KEY: dummy
                run: ./gradlew build -Dspring.profiles.active=dev
