name: CI-DEV (Build & Test for Dev)

on:
    push:
        branches: [ "dev" ]
    pull_request:
        branches: [ "dev" ]

permissions:
    contents: read

jobs:
    build:
        runs-on: ubuntu-latest

        services:
            postgres:
                image: postgres:15
                env:
                    POSTGRES_USER: calbak_user
                    POSTGRES_PASSWORD: calbak_password
                    POSTGRES_DB: calbak_db
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd pg_isready
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5

        steps:
            -   name: Checkout code
                uses: actions/checkout@v4

            -   name: Set up JDK 17
                uses: actions/setup-java@v4
                with:
                    java-version: '17'
                    distribution: 'temurin'
                    cache: 'gradle'

            -   name: Grant execute permission for gradlew
                run: chmod +x gradlew

            -   name: Build and Test with Gradle
                env:
                    GOOGLE_CLIENT_ID: dummy
                    GOOGLE_CLIENT_SECRET: dummy
                    JWT_SECRET: dummy_secret_key_for_test_environment_must_be_long_enough
                    GEMINI_API_KEY: dummy
                run: ./gradlew build -Dspring.profiles.active=dev
