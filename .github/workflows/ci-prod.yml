name: CI-PROD (Final Check before Main)

on:
    pull_request:
        branches: [ "main" ]

permissions:
    contents: read

jobs:
    build:
        runs-on: ubuntu-latest

        services:
            postgres:
                image: postgres:15
                env:
                    POSTGRES_USER: calbak_user
                    POSTGRES_PASSWORD: calbak_password
                    POSTGRES_DB: calbak_db
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd pg_isready
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5

        steps:
            -   name: Checkout code
                uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4 sha
                with:
                    persist-credentials: false

            -   name: Set up JDK 17
                uses: actions/setup-java@99b8673ff64fbf99d8d325f52d9a5bdedb8483e9 # v4.2.1 sha
                with:
                    java-version: '17'
                    distribution: 'temurin'
                    cache: 'gradle'

            -   name: Grant execute permission for gradlew
                run: chmod +x gradlew

            -   name: Build and Test with Gradle
                run: ./gradlew build
